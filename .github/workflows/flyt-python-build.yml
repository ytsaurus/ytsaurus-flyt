name: FLYT Python Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.11"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --extra dev --frozen --python ${{ matrix.python-version }}

      - name: Ruff check
        run: uv run ruff check src tests examples

      - name: Ruff format
        run: uv run ruff format --check src tests examples

      - name: Pytest
        run: uv run pytest -q

      - name: Build wheel
        run: uv build --wheel --out-dir /tmp/wheelhouse --python ${{ matrix.python-version }}
