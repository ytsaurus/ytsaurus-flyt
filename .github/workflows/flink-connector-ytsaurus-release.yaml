name: Release Java SDK

on:
  push:
    tags:
      - 'flink-connector-ytsaurus/1\.[0-9]+\.[0-9]+'

jobs:
  release:
    name: Run release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Execute Gradle build
        run: ./gradlew shadowJar

      - name: Parse tag
        id: tag
        run: |
          echo "RELEASE_VERSION=$(echo ${GITHUB_REF#refs/*/flink-connector-ytsaurus/})" >> $GITHUB_OUTPUT

      - name: Publish
        run: |
          ./gradlew flink-connector-ytsaurus:publish -PossrhUsername=${{ secrets.OSSRH_USERNAME }} -PossrhPassword=${{ secrets.OSSRH_PASSWORD }} -Pversion=${{ steps.tag.outputs.RELEASE_VERSION }} -PsigningPassword=${{ secrets.GPG_PASSWORD }} -PsigningKey="${{ secrets.GPG_PRIVATE_KEY }}"
