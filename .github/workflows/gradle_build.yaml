name: Build Gradle project

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'python/**'
      - '.github/workflows/flyt-python-build.yml'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'python/**'
      - '.github/workflows/flyt-python-build.yml'

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'liberica'

      - name: Build with Gradle
        run: ./gradlew shadowJar
