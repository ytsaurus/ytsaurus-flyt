name: Release Flink YSON

on:
  push:
    tags:
      - 'flink-yson/1\.[0-9]+\.[0-9]+'

jobs:
  release:
    name: Run release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Execute Gradle build
        run: ./gradlew shadowJar

      - name: Parse tag
        id: tag
        run: |
          echo "RELEASE_VERSION=$(echo ${GITHUB_REF#refs/*/flink-yson/})" >> $GITHUB_OUTPUT

      - name: Publish
        run: |
          ./gradlew flink-yson:publish -PossrhUsername=${{ secrets.OSSRH_USERNAME }} -PossrhPassword=${{ secrets.OSSRH_PASSWORD }} -Pversion=${{ steps.tag.outputs.RELEASE_VERSION }} -PsigningPassword=${{ secrets.GPG_PASSWORD }} -PsigningKey="${{ secrets.GPG_PRIVATE_KEY }}"

      - name: Upload to Central Publisher Portal
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          curl -v -u "$OSSRH_USERNAME:$OSSRH_PASSWORD" -X POST "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/tech.ytsaurus"
