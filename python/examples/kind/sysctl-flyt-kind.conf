# Apply on the Linux host (not inside Kind) before deploying the YTsaurus operator.
# Typical issue with Podman + Kind: default max_user_instances=128 is too low.
#
#   sudo cp sysctl-flyt-kind.conf /etc/sysctl.d/99-flyt-kind.conf
#   sudo sysctl --system
#
# Or one-shot:
#   sudo sysctl -w fs.inotify.max_user_instances=8192
#   sudo sysctl -w fs.inotify.max_user_watches=524288

fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 524288
