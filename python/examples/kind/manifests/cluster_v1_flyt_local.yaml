# Kind single-node YTsaurus (MICRO preset); trimmed vs upstream cluster_v1_local.yaml.
# https://github.com/ytsaurus/ytsaurus/blob/main/yt/docs/code-examples/cluster-config/cluster_v1_local.yaml
apiVersion: cluster.ytsaurus.tech/v1
kind: Ytsaurus
metadata:
  name: minisaurus
spec:
  # Do not flip useShortNames without wiping CR+PVCs (master address errors).
  useShortNames: true

  coreImage: ghcr.io/ytsaurus/ytsaurus:stable-25.2.1-relwithdebinfo

  discovery:
    instanceCount: 1

    loggers: &loggers
      - name: debug
        compression: zstd
        minLogLevel: debug
        writerType: file
        rotationPolicy: &rotationPolicy
          maxTotalSizeToKeep: 10000000
          rotationPeriodMilliseconds: 900000
        categoriesFilter:
          type: exclude
          values: [ "Bus", "Concurrency" ]
      - name: info
        minLogLevel: info
        writerType: file
        rotationPolicy: *rotationPolicy
      - name: error
        minLogLevel: error
        writerType: stderr

  primaryMasters:
    instanceCount: 1
    cellTag: 1
    loggers: *loggers
    locations:
      - locationType: MasterChangelogs
        path: /yt/master-data/master-changelogs
      - locationType: MasterSnapshots
        path: /yt/master-data/master-snapshots
      - locationType: Logs
        path: /yt/master-logs

    volumeMounts:
      - name: master-data
        mountPath: /yt/master-data
      - name: master-logs
        mountPath: /yt/master-logs

    volumeClaimTemplates:
      - metadata:
          name: master-data
        spec:
          accessModes: [ "ReadWriteOnce" ]
          resources:
            requests:
              storage: 5Gi
      - metadata:
          name: master-logs
        spec:
          accessModes: [ "ReadWriteOnce" ]
          resources:
            requests:
              storage: 5Gi

  # Single HTTP proxy on Kind: control role adds another pod; FLYT only needs default for yt proxy.
  httpProxies:
    - serviceType: NodePort
      loggers: *loggers
      instanceCount: 1
      role: default

  rpcProxies:
    - instanceCount: 1
      loggers: *loggers
      role: default

  # Default chunk/tablet replication expects RF=3; the master needs at least three online
  # data nodes ("Not enough data nodes available to write chunk" with only two).
  # On Podman, raise the Kind node cgroup PID limit before `kind create`; see
  # TROUBLESHOOTING.md and scripts/ensure-podman-pids-for-kind.sh.
  dataNodes:
    - instanceCount: 3
      loggers: *loggers

      volumeMounts:
        - name: node-data
          mountPath: /yt/node-data

      locations:
        - locationType: ChunkStore
          path: /yt/node-data/chunk-store

      volumeClaimTemplates:
        - metadata:
            name: node-data
          spec:
            accessModes: [ "ReadWriteOnce" ]
            resources:
              requests:
                storage: 5Gi

  execNodes:
    - instanceCount: 1
      loggers: *loggers
      resources:
        limits:
          cpu: "4"
          memory: 8Gi

      volumeMounts:
        - name: node-data
          mountPath: /yt/node-data

      volumes:
        - name: node-data
          emptyDir:
            sizeLimit: 8Gi

      locations:
        - locationType: ChunkCache
          path: /yt/node-data/chunk-cache
        - locationType: Slots
          path: /yt/node-data/slots

      jobProxyLoggers:
        - name: debug
          compression: zstd
          minLogLevel: debug
          writerType: file
          useTimestampSuffix: true
          rotationPolicy: &rotationPolicy
            maxTotalSizeToKeep: 10000000
            rotationPeriodMilliseconds: 900000
          categoriesFilter:
            type: exclude
            values: [ "Bus", "Concurrency" ]
        - name: info
          minLogLevel: info
          writerType: file
          rotationPolicy: *rotationPolicy

  schedulers:
    instanceCount: 1
    loggers: *loggers

  controllerAgents:
    instanceCount: 1
    loggers: *loggers

  ui:
    image: ghcr.io/ytsaurus/ui:stable
    serviceType: NodePort
    instanceCount: 1
    # Browser-side API calls cannot use in-cluster ClusterIP. Use the same hostname as in the browser URL (localhost vs 127.0.0.1) to avoid aborted requests.
    # Must match YT_HTTP_PROXY_PORT in scripts/port-forward-ui.sh (default 50005). Host:port only, no "http://" (UI builds URLs as //<externalProxy>/api/...).
    externalProxy: "localhost:50005"

  tabletNodes:
    - instanceCount: 1
      loggers: *loggers

  queueAgents:
    instanceCount: 1
    loggers: *loggers
